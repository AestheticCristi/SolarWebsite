<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Team | Autentificare Panel</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://discord.com; frame-src 'self' https://www.youtube.com; img-src 'self' https://i.imgur.com; style-src 'self' 'unsafe-inline';">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajustări curate pentru formular, compatibile cu orice fundal de temă */
        .login-wrapper {
            max-width: 450px;
            margin: 40px auto;
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0.9;
        }
        .form-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 6px;
            color: inherit;
            font-size: 1rem;
            transition: border-color 0.2s, background 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent, #3dd0ff);
            background: rgba(255, 255, 255, 0.08);
        }
        .error-message {
            color: #ff4a4a;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header class="hero" style="min-height: auto; padding-bottom: 20px;">
        <nav class="top-nav">
            <a href="index.html" class="brand">
                <span class="brand-logo"><img src="assets/9f7a582c5988268aafd7ef79a88fef6f.png" alt="Solar Team logo"></span>
                <span>SOLAR TEAM</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Acasă</a>
                <a href="despre.html">Despre</a>
                <a href="moduri.html">SolarCity</a>
                <a href="reguli.html">Regulamente</a>
                <a href="beach-please.html">Beach Please</a>
                <a href="aplicatii-staff.html">Aplicatii Staff</a>
                <a href="echipa.html">Echipa</a>
                <!-- Link activ pentru Panel -->
                <a href="suport.html" class="active">Panel</a>
            </div>
            <!-- Switcher-ul de teme inclus pentru control total -->
            <div class="theme-panel">
                <span>UI</span>
                <button class="theme-button active" data-theme="default" type="button"></button>
                <button class="theme-button" data-theme="neon" type="button"></button>
                <button class="theme-button" data-theme="retro" type="button"></button>
            </div>
        </nav>
    </header>

    <main class="page">
        <!-- Folosește clasa content-box pentru a împrumuta automat designul temei active -->
        <section class="content-box login-wrapper">
            <div style="text-align: center; margin-bottom: 24px;">
                <p class="eyebrow">Zonă Restrânsă</p>
                <h2 style="margin: 5px 0 0 0;">Conectare Core Panel</h2>
                <p style="opacity: 0.6; font-size: 0.85rem; margin-top: 5px;">Introdu datele pentru a accesa managementul ticthetelor</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Utilizator Admin</label>
                    <input type="text" id="username" class="form-input" required autocomplete="username" placeholder="Ex: admin">
                </div>
                
                <div class="form-group">
                    <label for="password">Parolă Securizată</label>
                    <input type="password" id="password" class="form-input" required autocomplete="current-password" placeholder="••••••••">
                </div>

                <div style="margin-top: 25px;">
                    <button type="submit" class="btn" style="width: 100%; text-align: center; justify-content: center;">Autentificare</button>
                </div>
                
                <div id="errorBox" class="error-message">✕ Date de acces incorecte!</div>
            </form>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <p class="footer-copyright">© 2026 Solar Team. Sistem administrativ sincronizat.</p>
        </div>
    </footer>

    <button class="scroll-top" type="button" aria-label="Înapoi sus">↑</button>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorBox = document.getElementById('errorBox');

            if (user === 'admin' && pass === 'solar2026') {
                errorBox.style.display = 'none';
                sessionStorage.setItem('solar_session', 'active_admin');
                window.location.href = 'support.html';
            } else {
                errorBox.style.display = 'block';
                document.getElementById('password').value = '';
            }
        }
    </script>
    
    <!-- Scripturile tale care se ocupă de citirea și aplicarea temei salvate -->
    <script src="js/style-switcher.js"></script>
    <script src="js/site-enhancements.js"></script>
</body>
</html>
